services:
  bootstrap:
    image: rust:1.85
    working_dir: /workspace
    volumes:
      - ../../:/workspace
      - ./state/bootstrap:/state
      - ./scripts:/scripts:ro
    command: >
      bash -lc "cargo build -p dsn-cli &&
      CFG_PATH=/state/bootstrap.toml
      STATE_DIR=/state/node-state
      LISTEN_JSON='[\"tcp://0.0.0.0:4101\"]'
      BOOTSTRAP_JSON='[]'
      /scripts/node-start.sh"

  node2:
    image: rust:1.85
    working_dir: /workspace
    depends_on: [bootstrap]
    volumes:
      - ../../:/workspace
      - ./state/node2:/state
      - ./scripts:/scripts:ro
    command: >
      bash -lc "cargo build -p dsn-cli &&
      CFG_PATH=/state/node2.toml
      STATE_DIR=/state/node-state
      LISTEN_JSON='[\"tcp://0.0.0.0:4101\"]'
      BOOTSTRAP_JSON='[\"tcp://bootstrap:4101\"]'
      /scripts/node-start.sh"

  relay:
    image: rust:1.85
    working_dir: /workspace
    depends_on: [bootstrap]
    volumes:
      - ../../:/workspace
      - ./state/relay:/state
      - ./scripts:/scripts:ro
    command: >
      bash -lc "cargo build -p dsn-cli &&
      CFG_PATH=/state/relay.toml
      STATE_DIR=/state/node-state
      LISTEN_JSON='[\"tcp://0.0.0.0:4101\"]'
      BOOTSTRAP_JSON='[\"tcp://bootstrap:4101\"]'
      /scripts/node-start.sh"

  checker:
    image: rust:1.85
    working_dir: /workspace
    depends_on: [bootstrap, node2, relay]
    volumes:
      - ../../:/workspace
      - ./state/bootstrap:/state/bootstrap
      - ./state/node2:/state/node2
      - ./state/relay:/state/relay
      - ./scripts:/scripts:ro
    entrypoint: ["bash", "-lc", "/scripts/testbed-check.sh"]
